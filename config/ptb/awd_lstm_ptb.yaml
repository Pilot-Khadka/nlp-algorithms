dataset:
  name: ptb
  sequence_length: 70
  vocab_size: 10000
  data_dir: data/dataset_penn_treebank/
  train_url: "https://raw.githubusercontent.com/tomsercu/lstm/master/data/ptb.train.txt"
  valid_url: "https://raw.githubusercontent.com/tomsercu/lstm/master/data/ptb.valid.txt"
  test_url: "https://raw.githubusercontent.com/tomsercu/lstm/master/data/ptb.test.txt"

  use_cache: true
  num_workers: auto
  pin_memory: true
  prefetch_factor: 2

tokenizer:
  name: whitespace

model:
  name: awd-lstm
  input_dim: 200
  hidden_dim: 1000
  num_layers: 3
  weight_tying: false # requires input and hidden dim both to be same

  embedding_dropout: 0.1 # dropoute in awd-lstm
  embedding_word_dropout: 0.4 #dropouti in awd-lstm

  dropout: 0.4 #dropout in awd-lstm
  hidden_dropout: 0.25 # dropouth in awd-lstm


train:
  epochs: 60
  batch_size: 32
  multi_gpu: true
  optimizer: adam
  learning_rate: 0.003
  lr_decay: 0.25
  grad_clip: 0.25
  weight_decay: 1.2e-6

task:
  name: language_modeling
  metrics:
    - perplexity
