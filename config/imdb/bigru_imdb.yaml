dataset:
  name: imdb
  sequence_length: 256
  vocab_size: 10000
  data_dir: data/dataset_imdb/
  url: "http://ai.stanford.edu/~amaas/data/sentiment/aclImdb_v1.tar.gz"

  num_class: 2
  use_cache: true
  num_workers: auto
  pin_memory: true
  prefetch_factor: 2


tokenizer:
  # name: whitespace
  name: bpe

dataloader:
  use_cache: true
  num_workers: auto
  pin_memory: true
  prefetch_factor: 2

model:
  name: gru
  input_dim: 128
  hidden_dim: 256
  num_layers: 2

  # flags follow bool format
  bidirectional: true
  weight_tying: false

train:
  epochs: 15
  batch_size: 64
  multi_gpu: true
  learning_rate: 1e-3
  grad_clip: 1.0

task:
  name: classification
  metrics:
    - accuracy
    - f1_score
    - precision
    - recall
