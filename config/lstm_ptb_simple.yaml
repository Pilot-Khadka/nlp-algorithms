dataset:
  name: ptb
  sequence_length: 35
  vocab_size: 5000
  data_dir: data/dataset_penn_treebank/
  train_url: "https://raw.githubusercontent.com/tomsercu/lstm/master/data/ptb.train.txt"
  valid_url: "https://raw.githubusercontent.com/tomsercu/lstm/master/data/ptb.valid.txt"
  test_url: "https://raw.githubusercontent.com/tomsercu/lstm/master/data/ptb.test.txt"
  num_workers: auto
  pin_memory: true
  prefetch_factor: 2

tokenizer:
  name: bpe

model:
  name: awd-lstm
  input_dim: 200
  hidden_dim: 200
  num_layers: 1
  dropout: 0.1
  embed_dropout: 0.05
  output_dropout: 0.1
  weight_dropout: 0.1
  bidirectional: false
  weight_tying: true

train:
  epochs: 10
  batch_size: 32
  optimizer: adamw
  learning_rate: 1e-2
  grad_clip: 0.25
  weight_decay: 1e-6
  compile_model: false

task:
  name: language_modeling
  metrics:
    - perplexity
