dataset:
  name: ptb
  sequence_length: 70
  data_dir: dataset/dataset_penn_treebank/
  train_url: "https://raw.githubusercontent.com/tomsercu/lstm/master/data/ptb.train.txt"
  valid_url: "https://raw.githubusercontent.com/tomsercu/lstm/master/data/ptb.valid.txt"
  test_url: "https://raw.githubusercontent.com/tomsercu/lstm/master/data/ptb.test.txt"

  use_cache: true          # Cache encoded tensors to disk
  num_workers: auto        # Set to integer or "auto" (cpu_count - 2)
  pin_memory: true         # Pin memory for faster GPU transfer
  prefetch_factor: 2       # Number of batches to prefetch per worker

model:
  name: awd-lstm
  input_dim: 300
  hidden_dim: 650
  num_layers: 2
  dropout: 0.5
  bidirectional: false
  weight_tying: true

train:
  epochs: 15
  batch_size: 32
  multi_gpu: true
  optimizer: adamw
  learning_rate: 1e-3
  lr_decay: 0.25
  grad_clip: 0.25
  weight_decay: 1e-6
  compile_model: false
  # checkpoint: "checkpoints/best.pt"

task:
  name: language_modeling
  metrics:
    - perplexity
